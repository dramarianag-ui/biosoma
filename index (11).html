async function enviarASheets(p,rep){
  var cfg=getCfg();if(!cfg.sheets_url)return{ok:false,msg:"URL de Sheets no configurada"};
  return new Promise(function(resolve){
    try{
      var h=p.historia||{};
      var data={
        fecha:new Date().toLocaleDateString("es-CR"),
        hora:new Date().toLocaleTimeString("es-CR",{hour:"2-digit",minute:"2-digit"}),
        nombre:h.nombre||"",cedula:h.cedula||"",edad:h.edad||"",
        genero:h.genero||"",correo:h.correo||"",celular:h.celular||"",
        diagnostico:h.diagnosticoPrincipal||"",
        eje_prioritario:rep?rep.dupla_top||"":"",
        ejes_evaluados:(p.duplas_completadas||[]).join(", "),
        medico:cfg.medico||""
      };
      // Usar form-data para evitar preflight CORS con Apps Script
      var form=new FormData();
      form.append("data",JSON.stringify(data));
      var xhr=new XMLHttpRequest();
      xhr.open("POST",cfg.sheets_url,true);
      xhr.onload=function(){resolve({ok:true});};
      xhr.onerror=function(){
        // Intentar con fetch no-cors como fallback
        fetch(cfg.sheets_url,{method:"POST",mode:"no-cors",
          body:JSON.stringify(data)}).then(function(){resolve({ok:true});}).catch(function(e){resolve({ok:false,msg:e.message});});
      };
      xhr.send(form);
    }catch(e){resolve({ok:false,msg:e.message});}
  });
}

// Generar PDF del reporte visible en pantalla
async function generarPDFBase64(){
  return new Promise(async function(resolve){
    try{
      var repEl=document.getElementById("rep-content");
      if(!repEl){resolve(null);return;}
      // Usar html2canvas para capturar el reporte
      var canvas=await html2canvas(repEl,{
        scale:1.5,useCORS:true,logging:false,
        backgroundColor:"#ffffff"
      });
      var imgData=canvas.toDataURL("image/jpeg",0.82);
      // Crear PDF con jsPDF
      var pdf=new window.jspdf.jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      var pageW=pdf.internal.pageSize.getWidth();
      var pageH=pdf.internal.pageSize.getHeight();
      var margin=12;
      var imgW=pageW-(margin*2);
      var imgH=(canvas.height*imgW)/canvas.width;
      var y=margin;
      // Paginación automática si el contenido es largo
      while(y<imgH+margin){
        pdf.addImage(imgData,"JPEG",margin,margin-(y-margin),imgW,imgH);
        y+=pageH-margin*2;
        if(y<imgH+margin)pdf.addPage();
      }
      var b64=pdf.output("datauristring").split(",")[1];
      resolve(b64);
    }catch(e){
      console.warn("PDF error:",e.message);
      resolve(null);
    }
  });
}

// ── SHARE / LOAD ─────────────────────────────────────────────────────────────
function serializeReporte(p){
  // Serializa el paciente + reporte en base64 para URL
  var obj={
    nombre:(p.historia||{}).nombre||"Paciente",
    cedula:(p.historia||{}).cedula||"",
    genero:(p.historia||{}).genero||"",
    edad:(p.historia||{}).edad||"",
    tipoSangre:(p.historia||{}).tipoSangre||"",
    profesion:(p.historia||{}).profesion||"",
    reporte:p.reporte,
    duplas_completadas:p.duplas_completadas||[],
    circuito:p.circuito||[],
    createdAt:p.createdAt
  };
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}catch(e){return null;}
}

function deserializeReporte(b64){
  try{return JSON.parse(decodeURIComponent(escape(atob(b64))));}catch(e){return null;}
}

function generateShareURL(p){
  var data=serializeReporte(p);
  if(!data)return null;
  // Comprimir URL: usar location sin hash
  var base=window.location.href.split('?')[0].split('#')[0];
  return base+"?rep="+data;
}

function loadFromURL(){
  var params=new URLSearchParams(window.location.search);
  var rep=params.get("rep");
  if(!rep)return false;
  var obj=deserializeReporte(rep);
  if(!obj||!obj.reporte)return false;
  // Crear paciente temporal desde URL
  var fakePac={
    id:"shared_"+Date.now(),
    createdAt:obj.createdAt||new Date().toISOString(),
    status:"completo",
    historia:{nombre:obj.nombre,cedula:obj.cedula,genero:obj.genero,edad:obj.edad,
      tipoSangre:obj.tipoSangre,profesion:obj.profesion,
      motivoConsulta:obj.reporte.resumen||"",diagnosticoPrincipal:"",
      antFamiliares:"",antPersonales:"",antQuirurgicos:"",
      medicamentos:"",suplementos:"",alergiaAlimentos:"",alergiaMedicamentos:"",
      tabaco:"",alcohol:"",preguntaTransformacional:""},
    evaluaciones:{},dental:{},
    duplas_completadas:obj.duplas_completadas||[],
    circuito:obj.circuito||[],
    reporte:obj.reporte,
    consentimiento:{aceptado:true}
  };
  // Agregar a pacs si no existe
  if(!S.pacs.find(function(p){return p.id===fakePac.id;}))
    S.pacs=[...S.pacs,fakePac];
  S.pid=fakePac.id;
  S.vista="reporte";
  return true;
}
