function sugerirItemsDesdeHistoria(historiaTxt,du){
  var txt=normTxt(historiaTxt);

  var idxs=[];
  du.items.forEach(function(item,i){
    var palabras=normTxt(item.label).split(/[^a-z0-9]+/).filter(function(w){return w.length>=5;});
    var match=palabras.some(function(w){return txt.indexOf(w)>=0;});

      match=item.subs.some(function(sub){
        var subw=normTxt(sub).split(/[^a-z0-9]+/).filter(function(w){return w.length>=5;});
        return subw.some(function(w){return txt.indexOf(w)>=0;});

  });

}

  ["ri\u00f1on","lumbalgia","miedo","panico","p\u00e1nico","memoria","oido","v\u00e9rtigo","huesos","fatiga cr\u00f3nica"].forEach(function(w){if(txt.includes(w))scores.agua+=3;});

async function enviarASheets(p,rep){
  var cfg=getCfg();if(!cfg.sheets_url)return{ok:false,msg:"URL de Sheets no configurada"};
  var medicoSheet=cfg.medico;
  if(p.profesional_codigo){
    try{
      var _profs2=await sbGetProfs();
      var _asig2=_profs2.find(function(x){return x.codigo===p.profesional_codigo;});
      if(_asig2)medicoSheet=_asig2.nombre||medicoSheet;
    }catch(e){/* respaldo: usa el medico general */}
  }
  return new Promise(function(resolve){
    try{
      var h=p.historia||{};
      var data={
        fecha:new Date().toLocaleDateString("es-CR"),
        hora:new Date().toLocaleTimeString("es-CR",{hour:"2-digit",minute:"2-digit"}),
        nombre:h.nombre||"",cedula:h.cedula||"",edad:h.edad||"",
        genero:h.genero||"",correo:h.correo||"",celular:h.celular||"",
        diagnostico:h.diagnosticoPrincipal||"",
        eje_prioritario:rep?rep.dupla_top||"":"",
        ejes_evaluados:(p.duplas_completadas||[]).join(", "),
        medico:medicoSheet||""
      };
      // Usar form-data para evitar preflight CORS con Apps Script
      var form=new FormData();
      form.append("data",JSON.stringify(data));
      var xhr=new XMLHttpRequest();
      xhr.open("POST",cfg.sheets_url,true);
      xhr.onload=function(){resolve({ok:true});};
      xhr.onerror=function(){
        // Intentar con fetch no-cors como fallback
        fetch(cfg.sheets_url,{method:"POST",mode:"no-cors",
          body:JSON.stringify(data)}).then(function(){resolve({ok:true});}).catch(function(e){resolve({ok:false,msg:e.message});});
      };
      xhr.send(form);
    }catch(e){resolve({ok:false,msg:e.message});}
  });
}

// Generar PDF del reporte visible en pantalla
async function generarPDFBase64(){
  return new Promise(async function(resolve){
    try{
      var repEl=document.getElementById("rep-content");
      if(!repEl){resolve(null);return;}
      // Usar html2canvas para capturar el reporte
      var canvas=await html2canvas(repEl,{
        scale:1.5,useCORS:true,logging:false,
        backgroundColor:"#ffffff"
      });
      var imgData=canvas.toDataURL("image/jpeg",0.82);
      // Crear PDF con jsPDF
      var pdf=new window.jspdf.jsPDF({orientation:"portrait",unit:"mm",format:"a4"});
      var pageW=pdf.internal.pageSize.getWidth();
      var pageH=pdf.internal.pageSize.getHeight();
      var margin=12;
      var imgW=pageW-(margin*2);
      var imgH=(canvas.height*imgW)/canvas.width;
      var y=margin;
      // Paginación automática si el contenido es largo
      while(y<imgH+margin){
        pdf.addImage(imgData,"JPEG",margin,margin-(y-margin),imgW,imgH);
        y+=pageH-margin*2;
        if(y<imgH+margin)pdf.addPage();
      }
      var b64=pdf.output("datauristring").split(",")[1];
      resolve(b64);
    }catch(e){
      console.warn("PDF error:",e.message);
      resolve(null);
    }
  });
}

// ── SHARE / LOAD ─────────────────────────────────────────────────────────────
function serializeReporte(p){
  // Serializa el paciente + reporte en base64 para URL
  var obj={
    nombre:(p.historia||{}).nombre||"Paciente",
    cedula:(p.historia||{}).cedula||"",
    genero:(p.historia||{}).genero||"",
    edad:(p.historia||{}).edad||"",
    tipoSangre:(p.historia||{}).tipoSangre||"",
    profesion:(p.historia||{}).profesion||"",
    reporte:p.reporte,
    duplas_completadas:p.duplas_completadas||[],
    circuito:p.circuito||[],
    createdAt:p.createdAt
  };
  try{return btoa(unescape(encodeURIComponent(JSON.stringify(obj))));}catch(e){return null;}
}

function deserializeReporte(b64){
  try{return JSON.parse(decodeURIComponent(escape(atob(b64))));}catch(e){return null;}
}

function generateShareURL(p){
  if(!p||!p.id||p.id==="demo1")return {ok:false,reason:"error",msg:"Este paciente de ejemplo no se puede compartir."};
  if(!p.reporte)return {ok:false,reason:"error",msg:"Genere el reporte primero."};
  var base=window.location.href.split('?')[0].split('#')[0];
  if(base.indexOf("file://")===0)return {ok:false,reason:"local",msg:"Est\xe1 probando el archivo localmente: el enlace generado solo funcionar\xeda en esta computadora. Suba el archivo a biosomamedicell2.vercel.app para obtener un enlace real que pueda compartir."};
  var url=base+"?vr="+encodeURIComponent(p.id);
  return {ok:true,url:url};
}

function loadFromURL(){
  var params=new URLSearchParams(window.location.search);
  var rep=params.get("rep");
  if(!rep)return false;
  var obj=deserializeReporte(rep);
  if(!obj||!obj.reporte)return false;
  // Crear paciente temporal desde URL
  var fakePac={
    id:"shared_"+Date.now(),
    createdAt:obj.createdAt||new Date().toISOString(),
    status:"completo",
    historia:{nombre:obj.nombre,cedula:obj.cedula,genero:obj.genero,edad:obj.edad,
      tipoSangre:obj.tipoSangre,profesion:obj.profesion,
      motivoConsulta:obj.reporte.resumen||"",diagnosticoPrincipal:"",
      antFamiliares:"",antPersonales:"",antQuirurgicos:"",
      medicamentos:"",suplementos:"",alergiaAlimentos:"",alergiaMedicamentos:"",
      tabaco:"",alcohol:"",preguntaTransformacional:""},
    evaluaciones:{},dental:{},
    duplas_completadas:obj.duplas_completadas||[],
    circuito:obj.circuito||[],
    reporte:obj.reporte,
    consentimiento:{aceptado:true}
  };
  // Agregar a pacs si no existe
  if(!S.pacs.find(function(p){return p.id===fakePac.id;}))
    S.pacs=[...S.pacs,fakePac];
  S.pid=fakePac.id;
  S.vista="reporte";
  return true;
}

async function loadFromURLShort(){
  var params=new URLSearchParams(window.location.search);
  var id=params.get("vr");
  if(!id)return false;
  var p=await sbFetchPacientePublico(id);
  if(!p){
    S.vista="portal";
    render();
    alert("Este enlace ya no est\xe1 disponible o el reporte a\xfan no se ha generado.");
    return true;
  }
  if(!S.pacs.find(function(x){return x.id===p.id;}))
    S.pacs=[...S.pacs,p];
  S.pid=p.id;
  S.vista="reporte";
  render();
  return true;
}

          +(cc?"?cc="+encodeURIComponent(cc)+"&":"?")
          +"subject="+encodeURIComponent(asunto)
          +"&body="+encodeURIComponent(cuerpo);
        var _m3=d.querySelector("#email-msg");
        if(_m3){
          _m3.style.display="block";_m3.style.background="#FFFBF2";_m3.style.borderColor="#C08A3E";
          _m3.innerHTML="<b style='color:#8B6010'>Pasos para enviar con PDF adjunto:</b><br>"
            +"<b>1.</b> Clic en <b>\ud83d\uddb8 Imprimir / PDF</b> \u2192 Guardar como PDF<br>"
            +"<b>2.</b> Su programa de correo se abre con un mensaje breve ya redactado<br>"
            +"<b>3.</b> Adjunte el PDF que guard\u00f3<br>"
            +"<b>4.</b> Enviar<br>"
            +"<div style='margin-top:8px'><button id='btn-copiar-cuerpo' class='btn-act' style='background:#fff;border:1px solid #C08A3E;color:#8B6010;font-size:11.5px;padding:5px 10px'>Copiar texto del correo</button> "
            +"<span style='font-size:10.5px;color:#8A8578'>Si no se abre su programa de correo, use este bot\u00f3n y p\u00e9guelo manualmente.</span></div>";
          var _bcc=_m3.querySelector("#btn-copiar-cuerpo");
          if(_bcc)_bcc.onclick=function(){
            try{navigator.clipboard.writeText("Para: "+to+(cc?"\nCC: "+cc:"")+"\nAsunto: "+asunto+"\n\n"+cuerpo);}catch(e2){}
            _bcc.textContent="\u2713 Copiado";setTimeout(function(){_bcc.textContent="Copiar texto del correo";},2000);
          };
        }
        var win=window.open(mailto,"_blank");
        if(!win){
          if(_m3)_m3.innerHTML+="<div style='margin-top:6px;color:#B33A3A'>\u26a0\ufe0f El navegador bloque\xf3 la apertura autom\xe1tica. Use el bot\xf3n de copiar arriba y p\xe9guelo en un correo nuevo.</div>";
        }
      }catch(err){
        var _m4=d.querySelector("#email-msg");
        if(_m4){_m4.style.display="block";_m4.style.background="#FEF0EE";_m4.style.borderColor="#B33A3A";_m4.innerHTML="<span style='color:#B33A3A'>\u26a0\ufe0f No se pudo preparar el correo: "+err.message+"</span>";}
      }
    };
  })();

  // Botón generar enlace
  d.querySelector("#btn-share").onclick=function(){
    var box=d.querySelector("#share-box");
    try{
      var res=generateShareURL(p);
      box.style.display="block";
      if(res.ok){
        d.querySelector("#share-url").value=res.url;
      } else {
        d.querySelector("#share-url").value=res.msg;
      }
    }catch(e){
      box.style.display="block";
      d.querySelector("#share-url").value="No se pudo generar el enlace: "+e.message;
    }
  };

  // Botón copiar
  d.querySelector("#btn-copy").onclick=function(){
    var inp=d.querySelector("#share-url");
    inp.select();
    try{
      navigator.clipboard.writeText(inp.value).then(function(){
        d.querySelector("#btn-copy").textContent="\u2713 Copiado";
        setTimeout(function(){d.querySelector("#btn-copy").textContent="Copiar enlace";},2000);
      });
    }catch(e){
      document.execCommand("copy");
      d.querySelector("#btn-copy").textContent="\u2713 Copiado";
      setTimeout(function(){d.querySelector("#btn-copy").textContent="Copiar enlace";},2000);
    }
  };

  d.querySelector("#bpan").onclick=function(){set({vista:"panel",iaRes:null,dupla:null,iaSig:null});};
  d.querySelector("#btab").onclick=function(){set({vista:"tablero"});};

  // Botón enviar correo — insertar en rep-actions (mejor presentación + un solo manejador)
  var _ra=d.querySelector(".rep-actions");
  if(_ra){
    var _be=document.createElement("button");
    _be.id="btn-email";
    _be.className="btn-act";
    _be.style.cssText="background:#4A7C59;color:#fff;border:none;border-radius:7px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer";
    _be.textContent="\u2709\ufe0f Enviar correo al paciente";
    _ra.appendChild(_be);
    _be.onclick=async function(){
      var _m=d.querySelector("#email-msg");
      if(_m){_m.style.display="block";_m.style.background="#F7F5EC";_m.style.borderColor="#D4D0C8";_m.innerHTML="<div style=\"display:flex;align-items:center;gap:8px\"><span class=\"spin\" style=\"display:inline-block\">\u23f3</span> Enviando correo y registrando en Sheets\u2026</div>";}
      _be.disabled=true;_be.style.opacity="0.65";
      var sr=await enviarASheets(p,rep);
      var er=await enviarCorreoConPDF(p,rep,obtenerLineasPlan());
      var ok=(sr.ok||er.ok);
      var _ms=[];
      _ms.push(sr.ok?"<div style=\"color:#0F6B65\">\u2713 Registrado en Google Sheets</div>":"<div style=\"color:#8B6010\">\u26a0\ufe0f Sheets: "+(sr.msg||"no configurado")+"</div>");
      if(er.ok&&er.paciente)_ms.push("<div style=\"color:#0F6B65\">\u2713 Correo enviado al paciente</div>");
      else if(er.ok)_ms.push("<div style=\"color:#8B6010\">\u26a0\ufe0f Paciente: "+(er.pacienteMotivo||"no enviado")+"</div>");
      if(er.ok&&er.medico)_ms.push("<div style=\"color:#0F6B65\">\u2713 Correo enviado al m\xe9dico ("+(er.medicoEmailUsado||getCfg().email_medico)+")</div>");
      else if(er.ok)_ms.push("<div style=\"color:#8B6010\">\u26a0\ufe0f M\xe9dico: "+(er.medicoMotivo||"no enviado")+"</div>");
      if(!er.ok)_ms.push("<div style=\"color:#B33A3A\">\u26a0\ufe0f "+(er.msg||"No se pudo enviar el correo")+" \u2014 revise \u2699\ufe0f Configuraci\xf3n</div>");
      if(_m){_m.style.background=ok?"#EAF5EF":"#FEF0EE";_m.style.borderColor=ok?"#0F6B65":"#B33A3A";_m.innerHTML=_ms.join("");}
      _be.disabled=false;_be.style.opacity="1";_be.textContent="\u2709\ufe0f Enviar correo al paciente";
    };
  }
  return d;
}
// Cargar desde URL si hay parámetro ?rep=
if(!loadFromURL()){
  var _params=new URLSearchParams(window.location.search);
  if(_params.get("vr"))loadFromURLShort();
  else render();
}
